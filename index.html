<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Expert - DepFMRJ</title>
    
    <!-- Scripts Necessários (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/lib/Recharts.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        .recharts-brush-texts { font-size: 10px; font-weight: bold; }
        .ai-content { line-height: 1.6; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Componente de Ícones Robusto (Inline SVG para evitar erros de CDN)
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>,
                Sparkles: <g><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M19 17v4M3 5h4M17 19h4"/></g>,
                Target: <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
                FileSpreadsheet: <g><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2M14 13h2M8 17h2M14 17h2M10 13v4M16 13v4"/></g>,
                TrendingUp: <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>,
                CheckCircle2: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            // Acesso seguro ao Recharts Global
            const { 
                LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
                ResponsiveContainer, ComposedChart, Bar, Brush 
            } = window.Recharts || {};

            const [data, setData] = useState([]);
            const [fileName, setFileName] = useState("");
            const [visibleRange, setVisibleRange] = useState({ startIndex: 0, endIndex: 0 });
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiError, setAiError] = useState("");

            // Chave de API - No trabalho, configure como variável de ambiente ou insira aqui
            const apiKey = ""; 

            const safeGetISODate = (val) => {
                if (!val) return null;
                if (val instanceof Date) return val.toISOString().split('T')[0];
                if (typeof val === 'number') {
                    const date = new Date(Math.round((val - 25569) * 86400 * 1000));
                    return date.toISOString().split('T')[0];
                }
                if (typeof val === 'string') {
                    const brMatch = val.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
                    if (brMatch) return `${brMatch[3]}-${brMatch[2].padStart(2, '0')}-${brMatch[1].padStart(2, '0')}`;
                }
                return null;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setFileName(file.name);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(ws);
                    
                    const normalized = jsonData.map(item => {
                        const newItem = {};
                        Object.keys(item).forEach(key => {
                            const normKey = key.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                            newItem[normKey] = item[key];
                        });
                        return newItem;
                    }).filter(item => String(item.STATUS || "").toUpperCase() !== "CANCELADO");

                    setData(normalized);
                };
                reader.readAsBinaryString(file);
            };

            const chartData = useMemo(() => {
                if (data.length === 0) return [];
                const stats = {};
                data.forEach(item => {
                    const e = safeGetISODate(item.DATA_ENTRADA);
                    const s = safeGetISODate(item.DATA_SEPARACAO || item.DATA_SEPARAÇÃO);
                    if (e) { stats[e] = stats[e] || { date: e, entradas: 0, separacoes: 0 }; stats[e].entradas++; }
                    if (s) { stats[s] = stats[s] || { date: s, entradas: 0, separacoes: 0 }; stats[s].separacoes++; }
                });
                const sorted = Object.values(stats).sort((a, b) => new Date(a.date) - new Date(b.date));
                return sorted.map((day, idx) => {
                    const calcMA = (p, key) => {
                        if (idx < p - 1) return null;
                        const sum = sorted.slice(idx - (p - 1), idx + 1).reduce((a, b) => a + (b[key] || 0), 0);
                        return parseFloat((sum / p).toFixed(2));
                    };
                    return { ...day, ma7_e: calcMA(7, 'entradas'), ma7_s: calcMA(7, 'separacoes'), ma30_e: calcMA(30, 'entradas'), ma30_s: calcMA(30, 'separacoes') };
                });
            }, [data]);

            useEffect(() => { if (chartData.length > 0) setVisibleRange({ startIndex: 0, endIndex: chartData.length - 1 }); }, [chartData]);

            const globalAvg = useMemo(() => {
                if (!chartData.length) return { e: 0, s: 0 };
                const te = chartData.reduce((a, b) => a + b.entradas, 0);
                const ts = chartData.reduce((a, b) => a + b.separacoes, 0);
                return { e: (te / chartData.length).toFixed(2), s: (ts / chartData.length).toFixed(2), totalDias: chartData.length };
            }, [chartData]);

            const selection = useMemo(() => {
                if (!chartData.length) return null;
                const slice = chartData.slice(visibleRange.startIndex, visibleRange.endIndex + 1);
                const e = slice.reduce((a, b) => a + b.entradas, 0);
                const s = slice.reduce((a, b) => a + b.separacoes, 0);
                return { 
                    e, s, 
                    bal: s - e, 
                    me: (e / slice.length).toFixed(2), 
                    ms: (s / slice.length).toFixed(2),
                    dias: slice.length 
                };
            }, [chartData, visibleRange]);

            const analyze = async () => {
                if (!selection || isAnalyzing) return;
                setIsAnalyzing(true); setAiError("");
                
                const systemPrompt = `Você é um Consultor Estratégico de Operações Sênior. 
                Analise o fluxo logístico considerando SAZONALIDADE e CAPACIDADE.
                
                ESTRUTURA OBRIGATÓRIA:
                1. RESUMO OPERACIONAL (🚨): Defina a saúde do fluxo em uma frase.
                2. ANÁLISE DE SAZONALIDADE (📊): Compare as entradas atuais com a média histórica para identificar picos.
                3. CAPACIDADE VS DEMANDA (⚙️): Avalie se a separação está constante enquanto a liberação oscila.
                4. TENDÊNCIA E AÇÃO (🚀): Projeção para o gargalo se o fluxo normalizar.

                REGRAS: SEM asteriscos, títulos em LETRAS MAIÚSCULAS, tom executivo e profundo, porém direto.`;

                const userQuery = `HISTÓRICO: Entradas:${globalAvg.e}/dia, Saídas:${globalAvg.s}/dia. 
                PERÍODO SELECIONADO: Entradas:${selection.me}/dia (Total:${selection.e}), Saídas:${selection.ms}/dia (Total:${selection.s}), Saldo:${selection.bal} em ${selection.dias} dias.`;
                
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await res.json();
                    if (result.candidates) {
                        setAiAnalysis(result.candidates[0].content.parts[0].text);
                    } else {
                        throw new Error();
                    }
                } catch { setAiError("Não foi possível gerar a análise. Verifique sua chave de API."); }
                finally { setIsAnalyzing(false); }
            };

            // Proteção contra carregamento incompleto do Recharts
            if (!window.Recharts) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <div className="text-center">
                            <svg className="animate-spin h-10 w-10 text-blue-600 mx-auto mb-4" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p className="text-slate-600 font-bold">Carregando painel de controle...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-900 p-2.5 rounded-2xl shadow-lg border border-slate-800">
                                <Icon name="Activity" className="text-white" size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">Supply Expert <span className="text-blue-600">DepFMRJ</span></h1>
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">v3.5 Stability Suite</span>
                                    <span className="w-1 h-1 rounded-full bg-blue-500"></span>
                                    <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Sazonalidade Ativa</span>
                                </div>
                            </div>
                        </div>
                        <label className="cursor-pointer px-8 py-3 rounded-2xl font-bold bg-white border border-slate-200 hover:border-blue-500 hover:text-blue-600 transition-all shadow-md text-sm hover:-translate-y-0.5 active:translate-y-0">
                            Importar Operação Logística
                            <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleFileUpload} />
                        </label>
                    </header>

                    {data.length > 0 ? (
                        <div className="space-y-6">
                            {/* KPIs Dinâmicos */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div className="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
                                    <p className="text-slate-400 text-[10px] font-black uppercase mb-1">Liberados (No Corte)</p>
                                    <p className="text-3xl font-black text-slate-800">{selection.e.toLocaleString()}</p>
                                    <div className="mt-2 text-[10px] text-blue-600 font-bold flex items-center gap-1">
                                        <Icon name="TrendingUp" size={12} /> Média: {selection.me}/dia
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
                                    <p className="text-emerald-500 text-[10px] font-black uppercase mb-1 italic">Separados (No Corte)</p>
                                    <p className="text-3xl font-black text-slate-800">{selection.s.toLocaleString()}</p>
                                    <div className="mt-2 text-[10px] text-emerald-600 font-bold flex items-center gap-1">
                                        <Icon name="CheckCircle2" size={12} /> Média: {selection.ms}/dia
                                    </div>
                                </div>
                                <div className={`p-6 rounded-[32px] border-2 shadow-sm transition-all ${selection.bal >= 0 ? 'bg-emerald-50 border-emerald-100' : 'bg-orange-50 border-orange-100'}`}>
                                    <p className="text-slate-500 text-[10px] font-black uppercase mb-1">Balanço do Recorte</p>
                                    <div className="flex items-center justify-between">
                                        <p className={`text-3xl font-black ${selection.bal >= 0 ? 'text-emerald-700' : 'text-orange-700'}`}>{selection.bal > 0 ? '+' : ''}{selection.bal.toLocaleString()}</p>
                                        <span className={`text-[8px] px-2 py-0.5 rounded-full font-black uppercase ${selection.bal >= 0 ? 'bg-emerald-200 text-emerald-800' : 'bg-orange-200 text-orange-800'}`}>
                                            {selection.bal >= 0 ? 'Fluxo Positivo' : 'Aumento de Backlog'}
                                        </span>
                                    </div>
                                </div>
                                <button onClick={analyze} disabled={isAnalyzing} className="p-6 rounded-[32px] bg-indigo-600 text-white font-black hover:bg-indigo-700 transition-all shadow-xl active:scale-95 flex flex-col items-start justify-center group overflow-hidden relative">
                                    <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-150 transition-transform">
                                        <Icon name="Sparkles" size={80} />
                                    </div>
                                    <span className="text-[10px] opacity-70 uppercase mb-1 font-bold">Inteligência Estratégica</span>
                                    <div className="flex items-center justify-between w-full relative z-10">
                                        <span className="text-xl">Diagnóstico ✨</span>
                                        {isAnalyzing ? <Icon name="Loader2" className="animate-spin" size={24} /> : <Icon name="Sparkles" size={24} />}
                                    </div>
                                </button>
                            </div>

                            {/* Card de Análise da IA */}
                            {(aiAnalysis || aiError) && (
                                <div className="p-8 bg-white rounded-[44px] border border-indigo-100 shadow-2xl animate-in zoom-in-95 duration-500">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="p-4 bg-indigo-600 text-white rounded-2xl shadow-lg"><Icon name="Target" size={28} /></div>
                                        <div>
                                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">Análise Preditiva e Sazonal</h3>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Baseado em {globalAvg.totalDias} dias de histórico operacional</p>
                                        </div>
                                    </div>
                                    <div className="text-slate-700 whitespace-pre-wrap font-medium ai-content bg-slate-50/50 p-8 rounded-3xl border border-slate-100">
                                        {aiAnalysis || aiError}
                                    </div>
                                </div>
                            )}

                            {/* Gráfico de Tendência */}
                            <div className="bg-white p-8 md:p-10 rounded-[56px] border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tighter">Performance de Picking e Liberação</h3>
                                        <p className="text-sm text-slate-400 mt-1 italic font-medium">Os KPIs acima sincronizam automaticamente com o recorte do gráfico.</p>
                                    </div>
                                    <div className="flex gap-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <div className="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase">
                                            <span className="w-3 h-3 rounded-full bg-blue-500"></span> Liberação
                                        </div>
                                        <div className="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase">
                                            <span className="w-3 h-3 rounded-full bg-emerald-500"></span> Separação
                                        </div>
                                    </div>
                                </div>
                                <div className="h-[550px] w-full">
                                    <ResponsiveContainer>
                                        <ComposedChart data={chartData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis 
                                                dataKey="date" 
                                                tick={{fontSize: 10, fill: '#94a3b8', fontWeight: 700}} 
                                                tickFormatter={v => v.split('-').reverse().slice(0,2).join('/')} 
                                                height={80} 
                                                axisLine={false}
                                                tickLine={false}
                                            />
                                            <YAxis tick={{fontSize: 10, fill: '#94a3b8', fontWeight: 700}} axisLine={false} tickLine={false} />
                                            <Tooltip 
                                                contentStyle={{borderRadius: '24px', border:'none', boxShadow:'0 20px 40px rgba(0,0,0,0.1)', padding:'20px'}}
                                                labelFormatter={val => `Data: ${val.split('-').reverse().join('/')}`}
                                            />
                                            <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{paddingBottom: '40px', fontSize: '12px', fontWeight: 800, textTransform: 'uppercase'}} />
                                            <Bar dataKey="entradas" name="Entradas Reais" fill="#e2e8f0" barSize={10} radius={[5,5,0,0]} opacity={0.5} />
                                            <Line type="monotone" dataKey="ma7_e" name="MM7 Liberação" stroke="#3b82f6" strokeWidth={4} dot={false} activeDot={{r: 8}} />
                                            <Line type="monotone" dataKey="ma7_s" name="MM7 Separação" stroke="#10b981" strokeWidth={4} dot={false} activeDot={{r: 8}} />
                                            <Line type="monotone" dataKey="ma30_e" name="Méd. Histórica Entrada" stroke="#1e40af" strokeWidth={1.5} strokeDasharray="6 4" dot={false} />
                                            <Line type="monotone" dataKey="ma30_s" name="Méd. Histórica Saída" stroke="#065f46" strokeWidth={1.5} strokeDasharray="6 4" dot={false} />
                                            <Brush 
                                                dataKey="date" 
                                                height={50} 
                                                stroke="#e2e8f0" 
                                                fill="#f8fafc"
                                                onChange={r => r && setVisibleRange({startIndex: r.startIndex, endIndex: r.endIndex})}
                                                tickFormatter={v => v.split('-').reverse().slice(1,2).join('/')}
                                            />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="mt-32 flex flex-col items-center text-center animate-in fade-in duration-700">
                            <div className="w-48 h-48 bg-white rounded-[60px] shadow-2xl flex items-center justify-center mb-10 border border-slate-50 relative">
                                <div className="absolute inset-0 bg-blue-500 opacity-5 animate-pulse rounded-[60px]"></div>
                                <Icon name="FileSpreadsheet" size={80} className="text-indigo-600 relative z-10" />
                            </div>
                            <h2 className="text-4xl font-black text-slate-800 tracking-tight">Aguardando Dados</h2>
                            <p className="font-bold uppercase tracking-widest text-[10px] text-slate-400 mt-4 leading-relaxed">
                                Importe o arquivo XLSX para habilitar a<br/>monitorização preditiva de supply chain
                            </p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
